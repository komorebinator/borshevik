name: SystemConfig
description: Configuration and data files copied into the image filesystem at build time (via COPY build_files/root/ /). Covers container signature policy, audio config, desktop entries, icons, branding assets, and OS release metadata.
extends: @Software
platform: Podman / WirePlumber / GNOME
src: build_files/root/
components:
  - name: container-policy
    type: @ConfigFile
    src: build_files/root/etc/containers/policy.json
    description: "Container image signature verification policy for Podman/bootc. Configures the 'default' transport to require Sigstore signatures verified against /etc/pki/containers/cosign.pub. Enforces that every 'rpm-ostree rebase' or 'bootc switch' to ghcr.io/komorebinator/* must be signed by the Borshevik cosign key."
  - name: container-registry-sigstore
    type: @ConfigFile
    src: build_files/root/etc/containers/registries.d/borshevik.yaml
    description: "Per-registry Sigstore verification config for ghcr.io/komorebinator. Points to the lookaside bundle location for signature storage."
  - name: wireplumber-no-autoswitch
    type: @ConfigFile
    src: build_files/root/etc/wireplumber/wireplumber.conf.d/50-disable-autoswitch.conf
    description: "WirePlumber audio policy config. Disables automatic output device switching when a new audio device is plugged in, preventing headphone plug-in from interrupting ongoing playback."
  - name: os-release
    type: @ConfigFile
    src: build_files/root/usr/lib/os-release
    description: "Template os-release file with Borshevik branding: NAME='Borshevik', ID='borshevik', ID_LIKE='fedora', HOME_URL, DOCUMENTATION_URL, SUPPORT_URL, BUG_REPORT_URL. The os-info.sh build script overwrites this with the final values including VERSION_ID."
  - name: app-manager-desktop
    type: @ConfigFile
    src: build_files/root/usr/share/applications/org.borshevik.AppManager.desktop
    description: "XDG desktop entry for the App Manager. Name='Borshevik App Manager', Exec=borshevik-app-manager, Icon=org.borshevik.AppManager, Categories=System. Makes the app visible in GNOME application launcher."
  - name: image-manager-desktop
    type: @ConfigFile
    src: build_files/root/usr/share/applications/org.borshevik.ImageManager.desktop
    description: "XDG desktop entry for the Image Manager. Name='Borshevik Image Manager', Exec=borshevik-image-manager, Icon=org.borshevik.ImageManager, Categories=System."
  - name: app-manager-icon
    type: @Graphic
    src: build_files/root/usr/share/icons/hicolor/scalable/apps/org.borshevik.AppManager.svg
    format: SVG
    role: app-icon
    description: App icon for the App Manager shown in GNOME launcher and taskbar.
  - name: image-manager-icon
    type: @Graphic
    src: build_files/root/usr/share/icons/hicolor/scalable/apps/org.borshevik.ImageManager.svg
    format: SVG
    role: app-icon
    description: App icon for the Image Manager shown in GNOME launcher and taskbar.
  - name: borshevik-logo
    type: @Graphic
    src: build_files/root/usr/share/pixmaps/borshevik_logo.svg
    format: SVG
    role: logo
    description: Primary distro logo shown in the Image Manager header and GDM login screen.
  - name: borshevik-logo-dark
    type: @Graphic
    src: build_files/root/usr/share/pixmaps/borshevik_logo_dark.svg
    format: SVG
    role: logo
    description: Dark-background variant of the distro logo; reserved for future use.
  - name: fedora-logo
    type: @Graphic
    src: build_files/root/usr/share/pixmaps/fedora_logo_med.png
    format: PNG
    role: placeholder
    description: Fedora logo fallback shown by the Image Manager when no Borshevik logo is found.
  - name: fedora-logo-white
    type: @Graphic
    src: build_files/root/usr/share/pixmaps/fedora_whitelogo_med.png
    format: PNG
    role: placeholder
    description: White Fedora logo fallback for dark backgrounds.
  - name: plymouth-watermark
    type: @Graphic
    src: build_files/root/usr/share/plymouth/themes/spinner/watermark.png
    format: PNG
    role: splash
    description: Watermark shown by Plymouth during boot splash.
  - name: cosign-key
    type: @PublicKey
    src: cosign.pub
    path: /etc/pki/containers/cosign.pub
    description: "Cosign public key used to verify Sigstore signatures on Borshevik OCI images. Copied into the image by the Containerfile; referenced by container-policy and container-registry-sigstore to enforce that all rpm-ostree rebase and bootc switch operations to ghcr.io/komorebinator/* must be signed."
