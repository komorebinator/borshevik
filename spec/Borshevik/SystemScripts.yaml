name: SystemScripts
description: Runtime shell scripts and CLI utilities installed into the image filesystem under /usr/bin/ and /usr/libexec/borshevik/.
extends: @Software
platform: bash
src: build_files/root/usr/
components:
  - name: app-manager-launcher
    type: @ShellScript
    src: build_files/root/usr/bin/borshevik-app-manager
    functions:
      - name: run
        description: "Exec gjs -m /usr/share/borshevik-app-manager/main.js, passing all arguments through."
  - name: image-manager-launcher
    type: @ShellScript
    src: build_files/root/usr/bin/borshevik-image-manager
    functions:
      - name: run
        description: "Exec gjs /usr/share/borshevik-image-manager/main.js, passing all arguments through."
  - name: app-manager-first-run
    type: @ShellScript
    src: build_files/root/usr/bin/borshevik-app-manager-first-run
    functions:
      - name: run
        description: "Checks for stamp file at ~/.local/state/borshevik/app-manager-first-run.done. If stamp exists, exits 0. Otherwise runs /usr/bin/borshevik-app-manager; if it exits 0, creates the stamp file. Ensures the App Manager opens exactly once on first login."
  - name: hiddify-wrapper
    type: @ShellScript
    src: build_files/root/usr/bin/hiddify
    functions:
      - name: run
        description: "Checks if hiddify is already running via 'pgrep -x hiddify'. If not running, exec /usr/lib/hiddify/hiddify with all arguments. Prevents duplicate Hiddify instances."
  - name: borshevik-promote-to-stable
    type: @ShellScript
    src: build_files/root/usr/bin/borshevik-promote-to-stable
    functions:
      - name: run
        description: "Positional args: digest (sha256:...) and variant (borshevik | borshevik-nvidia). Triggers promote-image-to-stable.yml GitHub Actions workflow on komorebinator/borshevik via 'gh workflow run' with --ref main -f digest=<digest> -f variant=<variant>. Waits 5s. Fetches the latest run ID via 'gh run list --workflow promote-image-to-stable.yml --limit 1 --json databaseId -q .[0].databaseId'. Exits with error if no run ID. Streams live progress via 'gh run watch <run_id> --exit-status'. Called by MainWindow's promote-to-stable action."
  - name: setup-kargs
    type: @ShellScript
    src: build_files/root/usr/libexec/borshevik/setup-kargs.sh
    functions:
      - name: run
        description: "NEEDED_ARGS starts with 'preempt=full'. If nvidia-driver RPM is installed (rpm -q), appends nvidia-drm.modeset=1, modprobe.blacklist=nouveau, modprobe.blacklist=nova_core, rd.driver.blacklist=nova_core. Reads /proc/cmdline into CMDLINE_ARGS array. Computes MISSING_ARGS = NEEDED_ARGS not in CMDLINE_ARGS. If both MISSING_ARGS and REMOVE_ARGS are empty, exits 0. Otherwise shows a plymouth message, calls rpm-ostree kargs with all --append=<arg> and --delete=<arg> in a single invocation, then calls systemctl reboot."
  - name: setup-ublue-mok
    type: @ShellScript
    src: build_files/root/usr/libexec/borshevik/setup-ublue-mok.sh
    functions:
      - name: run
        description: "Enrolls the uBlue MOK (Machine Owner Key) for NVIDIA Secure Boot. Checks if the key is already enrolled; if not, calls mokutil --import and schedules a reboot for the user to confirm in the UEFI MOK manager."
  - name: borshevik-kill-gnome-if-hung
    type: @ShellScript
    src: build_files/root/usr/libexec/borshevik/borshevik-kill-gnome-if-hung.sh
    functions:
      - name: run
        description: "Calls gdbus to query org.gnome.Shell ShellVersion with a 10s timeout. If the call times out or fails: uses pgrep -u $USER -x gnome-shell to find GNOME Shell PIDs. If any found: sends SIGTERM; waits 2s (GRACE period); if still running, sends SIGKILL. Runs every 1 minute via the watchdog timer."
