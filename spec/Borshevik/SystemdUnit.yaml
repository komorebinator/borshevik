name: SystemdUnit
description: A systemd unit file (service, timer, target, socket, etc.) that manages a system or user process lifecycle.
extends: @ConfigFile
properties:
  - name: unit_type
    description: type of unit — service, timer, target, socket, path, mount, etc.
  - name: scope
    description: whether this is a system unit (/usr/lib/systemd/system/) or user unit (/usr/lib/systemd/user/)
  - name: triggers
    description: what activates this unit — another unit (Wants/Requires/After), a timer, an event, or boot
  - name: executes
    description: command or script this unit runs (ExecStart); empty for non-service units
