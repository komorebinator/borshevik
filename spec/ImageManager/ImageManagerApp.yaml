name: ImageManagerApp
description: GJS application entry point. Resolves the base directory from import.meta.url, constructs I18n, and presents MainWindow.
extends: @Application
platform: GJS
src:
  - build_files/root/usr/share/borshevik-image-manager/main.js
  - build_files/root/usr/share/borshevik-image-manager/application.js
functions:
  - name: run
    description: "main.js: imports Application, constructs an instance, calls app.run(ARGV)."
  - name: _init
    description: "Registers GObject subclass with application_id='org.borshevik.ImageManager'. Resolves baseDir from Gio.File.new_for_uri(import.meta.url).get_parent(). Constructs I18n with baseDir/i18n as the locale directory. Wires 'activate' to _onActivate."
  - name: _onActivate
    description: "If no active_window: constructs MainWindow(this) and presents it. If a window already exists, just presents it (single-instance enforcement via GApplication)."
