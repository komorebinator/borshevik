name: SettingsWindow
description: Settings window for changing the image variant (Standard / NVIDIA) and channel (Latest / Stable / Custom tag). Applies the change via 'rpm-ostree rebase' with pkexec fallback on auth failure.
extends: @View
src: build_files/root/usr/share/borshevik-image-manager/settings_window.js
signals:
  - name: rebase-done
    description: Emitted after a successful rpm-ostree rebase. Received by MainWindow to trigger _refreshStatus().
components:
  - name: image-url-preview
    type: @Input
    label: "Image URL"
    description: "Read-only (editable:false, can_focus:false). Shows the computed target ref string, e.g. 'ostree-image-signed:docker://ghcr.io/komorebinator/borshevik:latest'. Updated reactively by _updateDerived() whenever variant or channel changes."
  - name: variant-group
    type: @View
    description: Adw.PreferencesGroup titled 'Variant'. Contains two radio button rows.
    components:
      - name: standard-radio
        type: @RadioButton
        label: "Standard"
        description: "Selects ghcr.io/komorebinator/borshevik as the base image. Part of a Gtk.CheckButton radio group."
      - name: nvidia-radio
        type: @RadioButton
        label: "NVIDIA"
        description: "Selects ghcr.io/komorebinator/borshevik-nvidia as the base image."
  - name: channel-group
    type: @View
    description: Adw.PreferencesGroup titled 'Channel'. Contains three radio button rows.
    components:
      - name: latest-radio
        type: @RadioButton
        label: "Latest"
        description: "Tags the target ref with ':latest'."
      - name: stable-radio
        type: @RadioButton
        label: "Stable"
        description: "Tags the target ref with ':stable'."
      - name: custom-radio
        type: @RadioButton
        label: "Custom"
        description: "Enables custom-tag-input; tags the target ref with the entered string."
  - name: custom-tag-input
    type: @Input
    label: "Custom tag"
    disabled: (when channel is not 'custom')
    description: "Free-text entry for a custom image tag (e.g. a date string or branch name). Feeds into RpmOstree#buildTargetRef as customTag."
  - name: apply-button
    type: @Button
    label: "Apply"
    disabled: (when settings are unchanged from initial state, or target ref is empty)
    description: "In header bar. On click: runs 'rpm-ostree rebase <target>' via ProgressWindow+CommandRunner; on auth error retries with pkexec. On success: closes both windows, emits 'rebase-done', calls Util#requestRebootInteractive."
  - name: reset-button
    type: @Button
    label: "Reset"
    description: "In header bar. Restores current to initial state and re-syncs all UI widgets."
functions:
  - name: _updateDerived
    description: "Computes target ref from RpmOstree#buildTargetRef(base, current.channel, current.customTag) where base is DEFAULT_STANDARD or DEFAULT_NVIDIA. Updates image-url-preview via _setPreviewText() (guarded by _settingText flag to prevent recursive changed signal). Shows/hides custom-tag-input based on channel==='custom'. Enables apply-button only when dirty (current ≠ initial via JSON.stringify) and target is non-empty. Appends '*' to window title when dirty."
  - name: _inferInitialState
    description: "Calls RpmOstree#inferVariantAndChannelFromOrigin(origin). Maps 'nvidia' to 'nvidia', anything else to 'standard' (custom variant is not exposed in the UI). Returns {variant, channel, customTag}."
