name: ImageManagerTranslations
description: JSON-file-based i18n for the Image Manager. Loads locale strings from i18n/<lang>.json at construction; falls back to en.json for missing keys. Supports en, ru, uk, ka, hy, be.
extends: @Singleton
src:
  - build_files/root/usr/share/borshevik-image-manager/i18n.js
  - build_files/root/usr/share/borshevik-image-manager/i18n/en.json
  - build_files/root/usr/share/borshevik-image-manager/i18n/ru.json
  - build_files/root/usr/share/borshevik-image-manager/i18n/uk.json
  - build_files/root/usr/share/borshevik-image-manager/i18n/ka.json
  - build_files/root/usr/share/borshevik-image-manager/i18n/hy.json
  - build_files/root/usr/share/borshevik-image-manager/i18n/be.json
functions:
  - name: constructor
    description: "Reads en.json from baseDir. Detects locale via LANGUAGE > LC_ALL > LC_MESSAGES > LANG env var chain; takes the first colon-separated segment; extracts the two-letter language code via regex. If locale differs from 'en', loads <locale>.json; on read or parse failure falls back to {}."
  - name: t
    description: "Looks up key in _dict (locale-specific), falls back to _en, falls back to key itself as the default string."
