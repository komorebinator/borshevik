name: ProgressWindow
description: Modal window shown during long-running operations (update, rollback, rebase). Streams live command output to a VTE terminal, shows indeterminate progress (pulsing) that switches to deterministic when [N/M] patterns are detected, and supports cancellation.
extends: @View
src: build_files/root/usr/share/borshevik-image-manager/progress_window.js
signals:
  - name: operation-complete
    description: "Emitted by stopProgress(). Carries a boolean 'success' parameter. Received by the caller to know whether to proceed with onSuccess logic."
  - name: operation-cancelled
    description: Emitted when the cancel button is clicked, before force_exit() is called on the runner.
components:
  - name: command-label
    type: @Label
    label: (the command string being run, e.g. "rpm-ostree update")
    description: CSS class caption. Set by setCommand(argv).
  - name: progress-bar
    type: @ProgressBar
    description: "Starts at 0, pulses every 80ms while running (indeterminate). Switches to deterministic fraction when appendOutput detects a [N/M] or (N/M) pattern in the output. Set to 1.0 by stopProgress()."
  - name: cancel-button
    type: @Button
    label: "Cancel"
    description: "Enabled during operation. On click: emits operation-cancelled, disables itself, calls runner.cancel()."
  - name: terminal
    type: @LongText
    description: "Vte.Terminal instance. Receives output via appendOutput() which feeds text as CRLF (replaces \\n with \\r\\n). Paired with a plain Gtk.Scrollbar attached to the terminal's own vadjustment (VTE implements GtkScrollable; do NOT wrap in ScrolledWindow)."
  - name: close-button
    type: @Button
    label: "Close"
    disabled: (while operation is running)
    description: Enabled by stopProgress(). On click: closes the window.
functions:
  - name: startProgress
    description: "Resets VTE terminal. Sets progress to 0. Starts an 80ms GLib timeout that calls progress.pulse() (GLib.SOURCE_CONTINUE) for indeterminate animation. Enables cancel-button, disables close-button."
  - name: stopProgress
    description: "Removes the pulse timer. Sets progress to 1.0. Disables cancel-button, enables close-button. Emits 'operation-complete' with success flag."
  - name: appendOutput
    description: "Feeds text to VTE replacing \\n with \\r\\n. Calls _parseProgress(text) to detect [N/M] or (N/M) patterns; if found, sets progress to N/M fraction and removes the pulse timer."
