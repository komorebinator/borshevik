name: ImageBuild
description: OCI container image build pipeline — multi-stage Containerfile, a Justfile for local development, and bash build scripts that run inside rootful Podman during docker build.
extends: @Software
platform: bash + Containerfile (BuildKit) + just
src: build_files/scripts/
components:
  - name: containerfile
    type: @Script
    src: Containerfile
    interpreter: Dockerfile (BuildKit)
    functions:
      - name: build
        description: "Four named targets. 'ctx': FROM scratch, COPYs build_files/scripts to /build_scripts/. 'borshevik-base': FROM ghcr.io/ublue-os/silverblue-main:<FEDORA_MAJOR_VERSION>; copies cosign.pub to /etc/pki/containers/; runs build-base.sh; ostree container commit. 'borshevik-base-nvidia': FROM borshevik-base; COPYs akmods-nvidia-open image content to /tmp/akmods-nvidia; runs build-base-nvidia.sh; ostree container commit. 'borshevik': FROM ghcr.io/komorebinator/borshevik-base:latest; COPYs build_files/root/ to /; runs build-addons.sh; ostree container commit. 'borshevik-nvidia': same as borshevik but FROM borshevik-base-nvidia:latest. Build args: FEDORA_MAJOR_VERSION (default 44), IMAGE_NAME, IMAGE_TAG, BUILD_DATE."
  - name: build-base
    type: @ShellScript
    src: build_files/scripts/build-base.sh
    functions:
      - name: run
        description: "Orchestrates borshevik-base layer (set -ouex pipefail): runs install-rpm-packages.sh → @GoogleChromeApp#installer → @SteamApp#installer → cleanup.sh. Enables podman.socket via systemctl enable."
  - name: build-base-nvidia
    type: @ShellScript
    src: build_files/scripts/build-base-nvidia.sh
    functions:
      - name: run
        description: "Installs the NVIDIA proprietary driver and CUDA stack from /tmp/akmods-nvidia (content of the akmod-nvidia-open image COPYed in by the Containerfile). Runs cleanup.sh."
  - name: build-addons
    type: @ShellScript
    src: build_files/scripts/build-addons.sh
    functions:
      - name: run
        description: "Orchestrates the final borshevik/borshevik-nvidia layer (set -ouex pipefail): os-info.sh → @HiddifyApp#installer → @GnomeExtensions#installer → @ShellCustomizations#apply-schemas → @ShellCustomizations#apply-dconf → @Services#enable-services → rebuild-initramfs.sh."
  - name: install-rpm-packages
    type: @ShellScript
    src: build_files/scripts/install-rpm-packages.sh
    functions:
      - name: run
        description: "rpm-ostree install: htop, mc, gnome-tweaks, pwgen, openssl, distrobox, zsh, gh, adw-gtk3-theme, meson, cmake, gcc (needed to build GNOME extensions), libxcrypt-compat."
  - name: rebuild-initramfs
    type: @ShellScript
    src: build_files/scripts/rebuild-initramfs.sh
    functions:
      - name: run
        description: "Rebuilds initramfs via dracut --regenerate-all --force to include all installed kernel modules and hooks."
  - name: cleanup
    type: @ShellScript
    src: build_files/scripts/cleanup.sh
    functions:
      - name: run
        description: "Cleans rpm/dnf package manager caches and removes temp files to reduce the final image layer size."
  - name: os-info
    type: @ShellScript
    src: build_files/scripts/os-info.sh
    functions:
      - name: run
        description: "Writes Borshevik branding to /usr/lib/os-release: NAME='Borshevik', ID='borshevik', ID_LIKE='fedora', VERSION_ID, PRETTY_NAME, HOME_URL=https://borshevik.org, and related URLs. Preserves the base Fedora ID_LIKE field."
